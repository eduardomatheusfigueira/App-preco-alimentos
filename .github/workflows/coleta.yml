name: Coleta Diária - Cesta Básica

on:
  schedule:
    # Roda diariamente às 11:00 UTC (08:00 horário de Brasília)
    - cron: '0 11 * * *'
  workflow_dispatch: # Permite execução manual

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar coleta (Curitiba)
        run: python collector.py --cidade "Curitiba"

      - name: Commit do banco atualizado
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cesta_basica.db
          git diff --staged --quiet || git commit -m "📊 Coleta diária $(date +'%Y-%m-%d')"
          git push
